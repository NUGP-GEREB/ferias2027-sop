    ];

    const SENHA_ADMIN = "admin2026";
    const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    // ================================================================
    // 3. ESTADO E REFERÊNCIAS DOM
    // ================================================================
    let dadosLocais = {};
    let usuarioMatricula = null;
    let modoAdmin = false;

    const inputMatricula = document.getElementById('inputMatricula');
    const btnIdentificar = document.getElementById('btnIdentificar');
    const usuarioAtual = document.getElementById('usuarioAtual');

    const btnExportarAdmin = document.getElementById('btnExportarAdmin');
    const btnLimparAdmin = document.getElementById('btnLimparAdmin');

    // ================================================================
    // 4. FUNÇÕES DE API
    // ================================================================
    async function carregarDaAPI() {
        try {
            const resp = await fetch(API_URL + '?acao=ler');
            if (!resp.ok) throw new Error('Erro ao buscar dados');
            const data = await resp.json();
            dadosLocais = {};
            data.forEach(row => {
                const mat = row.matricula;
                if (!mat) return;
                dadosLocais[mat] = {
                    opcoes: [
                        row.opcao1 || '',
                        row.opcao2 || '',
                        row.opcao3 || '',
                        row.opcao4 || '',
                        row.opcao5 || '',
                        row.opcao6 || ''
                    ],
                    antecipacao: row.antecipacao || '',
                    bloqueado: row.bloqueado === 'TRUE' || row.bloqueado === true
                };
            });
            POLICIAIS.forEach(p => {
                if (!dadosLocais[p.matricula]) {
                    dadosLocais[p.matricula] = { opcoes: ['','','','','',''], antecipacao: '', bloqueado: false };
                }
            });
            renderizarTabela();
        } catch (err) {
            mostrarMensagem('Erro ao carregar dados: ' + err.message, 'error');
            // Fallback para dados locais
            POLICIAIS.forEach(p => {
                if (!dadosLocais[p.matricula]) {
                    dadosLocais[p.matricula] = { opcoes: ['','','','','',''], antecipacao: '', bloqueado: false };
                }
            });
            renderizarTabela();
        }
    }

    async function salvarNaAPI(matricula, dados) {
        const payload = {
            acao: 'salvar',
            matricula: matricula,
            posto: POLICIAIS.find(p => p.matricula === matricula)?.posto || '',
            nome: POLICIAIS.find(p => p.matricula === matricula)?.nome || '',
            opcao1: dados.opcoes[0] || '',
            opcao2: dados.opcoes[1] || '',
            opcao3: dados.opcoes[2] || '',
            opcao4: dados.opcoes[3] || '',
            opcao5: dados.opcoes[4] || '',
            opcao6: dados.opcoes[5] || '',
            antecipacao: dados.antecipacao || '',
            bloqueado: dados.bloqueado ? 'TRUE' : 'FALSE'
        };
        const resp = await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        // no-cors não retorna resposta, mas a requisição é enviada.
        return true;
    }

    // ================================================================
    // 5. RENDERIZAÇÃO
    // ================================================================
    function getSelectOptions(selected) {
        let html = '<option value="">Selecione</option>';
        meses.forEach(m => {
            const sel = (m === selected) ? 'selected' : '';
            html += <option value="${m}" ${sel}>${m}</option>;
        });
        return html;
    }

    function isPrimeiroSemestre(mes) {
        if (!mes) return false;
        const idx = meses.indexOf(mes);
        return idx >= 0 && idx < 6;
    }

    function temOpcaoPrimeiroSemestre(opcoes) {
        if (!opcoes) return false;
        return opcoes.some(m => isPrimeiroSemestre(m));
    }

    function renderizarTabela() {
        let html = '';
        POLICIAIS.forEach(p => {
            const dados = dadosLocais[p.matricula] || { opcoes: ['','','','','',''], antecipacao: '', bloqueado: false };
            const opcoes = dados.opcoes || [];
            while (opcoes.length < 6) opcoes.push('');
            const antecipacao = dados.antecipacao || '';
            const showAntecipacao = temOpcaoPrimeiroSemestre(opcoes);
            const bloqueado = dados.bloqueado === true;

            const isUsuario = (usuarioMatricula === p.matricula);
            const podeEditar = isUsuario && !bloqueado && usuarioMatricula !== null;

            const classeLinha = isUsuario ? 'linha-usuario' : '';

            html += <tr class="${classeLinha}" data-matricula="${p.matricula}">;
            html += <td class="posto">${p.posto}</td>;
            html += <td class="nome">${p.nome}</td>;
            html += <td>${p.matricula}</td>;

            for (let i = 0; i < 6; i++) {
                const val = opcoes[i] || '';
                const disabled = !podeEditar ? 'disabled' : '';
                html += `<td><select data-matricula="${p.matricula}" data-opcao="${i}" ${disabled}>
                            ${getSelectOptions(val)}
                        </select></td>`;
            }

            html += <td class="antecipacao">;
            if (showAntecipacao) {
                const disabled = !podeEditar ? 'disabled' : '';
                html += `<select data-matricula="${p.matricula}" data-campo="antecipacao" ${disabled}>
                            <option value="">Selecione</option>
                            <option value="sim" ${antecipacao === 'sim' ? 'selected' : ''}>Sim</option>
                            <option value="nao" ${antecipacao === 'nao' ? 'selected' : ''}>Não</option>
                        </select>`;
            } else {
                html += <span style="color:#6a7a8a;font-size:0.75rem;">—</span>;
            }
            html += </td>;

            html += <td>;
            if (isUsuario) {
                if (bloqueado) {
                    html += <span class="status-linha bloqueado">🔒 Bloqueado</span>;
                } else {
                    const hasSelection = opcoes.some(o => o !== '');
                    html += <button class="btn-editar" data-acao="salvar" data-matricula="${p.matricula}">;
                    html += hasSelection ? '💾 Salvar' : '📝 Editar';
                    html += </button>;
                }
            } else {
                if (usuarioMatricula === null) {
                    html += <span class="status-linha">—</span>;
                } else {
                    html += <span class="status-linha">🔒</span>;
                }
            }
            html += </td>;
            html += </tr>;
        });

        tabelaCorpo.innerHTML = html;

        tabelaCorpo.querySelectorAll('.btn-editar').forEach(btn => {
            btn.addEventListener('click', function() {
                const matricula = this.dataset.matricula;
                salvarEBloquear(matricula);
            });
        });

        if (usuarioMatricula) {
            const policial = POLICIAIS.find(p => p.matricula === usuarioMatricula);
            if (policial) {
                usuarioAtual.textContent = 👤 ${policial.nome} (${policial.matricula});
            } else {
                usuarioAtual.textContent = '';
            }
        } else {
            usuarioAtual.textContent = '';
        }
    }

    // ================================================================
    // 6. SALVAR E BLOQUEAR (com envio para a API)
    // ================================================================
    async function salvarEBloquear(matricula) {
        if (!confirm(Tem certeza que deseja salvar e bloquear as férias para a matrícula ${matricula}?)) {
            return;
        }

        const linha = document.querySelector(tr[data-matricula="${matricula}"]);
        if (!linha) return;

        const selects = linha.querySelectorAll('select');
        const opcoes = [];
        let antecipacao = '';
        selects.forEach(sel => {
            const opcao = sel.dataset.opcao;
            const campo = sel.dataset.campo;
            if (opcao !== undefined) {
                opcoes[parseInt(opcao)] = sel.value;
            } else if (campo === 'antecipacao') {
                antecipacao = sel.value;
            }
        });

        const dados = {
            opcoes: opcoes,
            antecipacao: antecipacao,
            bloqueado: true
        };

        // Atualiza localmente
        dadosLocais[matricula] = dados;

        // Envia para a planilha
        try {
            await salvarNaAPI(matricula, dados);
            mostrarMensagem(Férias salvas e bloqueadas para ${matricula}. Dados enviados para a planilha central., 'success');
            // Recarrega os dados da API para sincronizar
            await carregarDaAPI();
        } catch (err) {
            mostrarMensagem('Erro ao enviar para a planilha: ' + err.message + '. Dados salvos apenas localmente.', 'error');
            // Mantém localmente
            salvarDadosLocalmente();
            renderizarTabela();
        }
    }

    // ================================================================
    // 7. FUNÇÕES DE FALLBACK LOCAL (caso a API falhe)
    // ================================================================
    function salvarDadosLocalmente() {
        localStorage.setItem('feriasSOP_fallback', JSON.stringify(dadosLocais));
    }

    function carregarDadosLocais() {
        const stored = localStorage.getItem('feriasSOP_fallback');
        if (stored) {
            try { dadosLocais = JSON.parse(stored); } catch(e) {}
        }
    }

    // ================================================================
    // 8. ADMIN: DESBLOQUEAR (também envia para API)
    // ================================================================
    async function desbloquearLinha(matricula) {
        if (!dadosLocais[matricula]) {
            adminMensagem.textContent = 'Matrícula não encontrada.';
            adminMensagem.style.color = '#b22222';
            return;
        }
        dadosLocais[matricula].bloqueado = false;
        try {
            await salvarNaAPI(matricula, dadosLocais[matricula]);
            adminMensagem.textContent = Linha ${matricula} desbloqueada com sucesso!;
            adminMensagem.style.color = '#2c7a4a';
            await carregarDaAPI();
        } catch (err) {
            adminMensagem.textContent = 'Erro ao desbloquear: ' + err.message;
            adminMensagem.style.color = '#b22222';
            salvarDadosLocalmente();
            renderizarTabela();
        }
    }

    // ================================================================
    // 9. EXPORTAR CSV
    // ================================================================
    function exportarCSV() {
        let csv = 'Posto/Grad,Nome,Matrícula,Opção1,Opção2,Opção3,Opção4,Opção5,Opção6,Antecipação 13º,Bloqueado\n';
        POLICIAIS.forEach(p => {
            const dados = dadosLocais[p.matricula] || { opcoes: ['','','','','',''], antecipacao: '', bloqueado: false };
            const opcoes = dados.opcoes || [];
            while (opcoes.length < 6) opcoes.push('');
            const linha = [
                p.posto,
                p.nome,
                p.matricula,
                ...opcoes,
                dados.antecipacao || '',
                dados.bloqueado ? 'Sim' : 'Não'
            ].map(v => "${v}").join(',');
            csv += linha + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'ferias_sop.csv';
        link.click();
        URL.revokeObjectURL(link.href);
        mostrarMensagem('CSV exportado com sucesso!', 'success');
    }

    // ================================================================
    // 10. LIMPAR DADOS (envia para API)
    // ================================================================
    async function limparTodosDados() {
        if (!confirm('Tem certeza? Isso apagará TODAS as escolhas de férias.')) return;
        for (const p of POLICIAIS) {
            const dados = {
                opcoes: ['','','','','',''],
                antecipacao: '',
                bloqueado: false
            };
            dadosLocais[p.matricula] = dados;
            await salvarNaAPI(p.matricula, dados);
        }
        await carregarDaAPI();
        mostrarMensagem('Todos os dados foram limpos.', 'warning');
    }

    // ================================================================
    // 11. MENSAGENS E AUTENTICAÇÃO ADMIN
    // ================================================================
    function mostrarMensagem(texto, tipo = 'info') {
        mensagemDiv.textContent = texto;
        mensagemDiv.className = alert ${tipo};
        mensagemDiv.style.display = 'block';
        setTimeout(() => {
            mensagemDiv.style.display = 'none';
        }, 5000);
    }

    function autenticarAdmin(senha) {
        if (senha === SENHA_ADMIN) {
            modoAdmin = true;
            adminModal.style.display = 'block';
            adminMensagem.textContent = '';
            adminSenha.value = '';
            return true;
        } else {
            adminMensagem.textContent = 'Senha incorreta.';
            adminMensagem.style.color = '#b22222';
            return false;
        }
    }

    // ================================================================
    // 12. EVENTOS
    // ================================================================
    function identificarUsuario() {
        const mat = inputMatricula.value.trim();
        if (!mat) {
            mostrarMensagem('Digite uma matrícula.', 'error');
            return;
        }
        const existe = POLICIAIS.some(p => p.matricula === mat);
        if (!existe) {
            mostrarMensagem('Matrícula não encontrada.', 'error');
            usuarioMatricula = null;
            sessionStorage.removeItem('usuarioMatriculaSOP');
            renderizarTabela();
            return;
        }
        usuarioMatricula = mat;
        sessionStorage.setItem('usuarioMatriculaSOP', mat);
        renderizarTabela();
        mostrarMensagem(Identificado como matrícula ${mat}., 'success');
        inputMatricula.value = '';
    }

    btnIdentificar.addEventListener('click', identificarUsuario);
    inputMatricula.addEventListener('keypress', e => { if (e.key === 'Enter') identificarUsuario(); });

    btnAdmin.addEventListener('click', function() {
        if (adminModal.style.display === 'block') {
            adminModal.style.display = 'none';
            modoAdmin = false;
            adminMensagem.textContent = '';
        } else {
            if (modoAdmin) {
                adminModal.style.display = 'block';
            } else {
                const senha = prompt('Digite a senha de administrador:');
                if (senha !== null) {
                    if (autenticarAdmin(senha)) {
                        adminModal.style.display = 'block';
                    } else {
                        alert('Senha incorreta.');
                    }
                }
            }
        }
    });

    btnFecharAdmin.addEventListener('click', function() {
        adminModal.style.display = 'none';
        modoAdmin = false;
        adminMensagem.textContent = '';
    });

    btnDesbloquearExec.addEventListener('click', async function() {
        const mat = adminMatriculaDesbloq.value.trim();
        if (!mat) {
            adminMensagem.textContent = 'Digite uma matrícula.';
            adminMensagem.style.color = '#b22222';
            return;
        }
        if (!modoAdmin) {
            adminMensagem.textContent = 'Autentique-se como admin primeiro.';
            adminMensagem.style.color = '#b22222';
            return;
        }
        await desbloquearLinha(mat);
        adminMatriculaDesbloq.value = '';
    });

    btnDesbloquear.addEventListener('click', function() {
        btnDesbloquearExec.click();
    });

    btnExportar.addEventListener('click', exportarCSV);
    btnExportarAdmin.addEventListener('click', exportarCSV);
    btnLimpar.addEventListener('click', limparTodosDados);
    btnLimparAdmin.addEventListener('click', limparTodosDados);

    // ================================================================
    // 13. INICIALIZAÇÃO
    // ================================================================
    // Primeiro, tenta carregar da API
    carregarDaAPI();

    // Se falhar, usa fallback local
    carregarDadosLocais();

    // Restaurar sessão
    const sessao = sessionStorage.getItem('usuarioMatriculaSOP');
    if (sessao) {
        const mat = sessao;
        const existe = POLICIAIS.some(p => p.matricula === mat);
        if (existe) {
            usuarioMatricula = mat;
        }
    }

    console.log('Painel SOP/PMDF com integração com planilha central.');
</script>
</body>
</html>
